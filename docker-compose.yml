services:

  # Docker-in-Docker daemon — user terminal containers are spawned here.
  # Both dind and backend mount the same named volumes at identical paths so
  # that volume specs passed to "docker run" by the backend resolve correctly
  # inside DinD's daemon.
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 10s
      retries: 12
    volumes:
      - dind-storage:/var/lib/docker
      - 3compute-uploads:/var/lib/3compute/uploads
      - 3compute-classrooms:/var/lib/3compute/classrooms
    networks:
      - dev-net

  # One-shot: builds the 3compute terminal image into DinD on every compose up.
  image-builder:
    image: docker:27-cli
    environment:
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - ./backend:/workspace
    working_dir: /workspace
    command: docker build -t 3compute:latest .
    depends_on:
      dind:
        condition: service_healthy
    networks:
      - dev-net

  # Mirrors ExecStartPre=+/bin/chown -R www-data:www-data /var/lib/3compute in systemd
  data-init:
    image: alpine:3
    command: sh -c "mkdir -p /data/uploads /data/classrooms && chown -R 33:33 /data"
    volumes:
      - 3compute-base:/data
      - 3compute-uploads:/data/uploads
      - 3compute-classrooms:/data/classrooms

  # FastAPI backend with hot-reload
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "33:33"  # www-data, mirrors prod
    cap_add:
      - CHOWN  # mirrors AmbientCapabilities=CAP_CHOWN in systemd service
    environment:
      DOCKER_HOST: tcp://dind:2375
      UPLOADS_ROOT: /var/lib/3compute/uploads
      CLASSROOMS_ROOT: /var/lib/3compute/classrooms
      USERS_JSON_FILE: /var/lib/3compute/users.json
    env_file:
      - backend/.env
    volumes:
      - .:/var/www/3compute
      - backend-logs:/var/www/3compute/logs
      - 3compute-base:/var/lib/3compute
      - 3compute-uploads:/var/lib/3compute/uploads
      - 3compute-classrooms:/var/lib/3compute/classrooms
    working_dir: /var/www/3compute
    command: sh -c "pip install -q -r backend/requirements.txt && python -m backend.api --host 0.0.0.0 --port 5555 --reload"
    ports:
      - "5555:5555"
    depends_on:
      dind:
        condition: service_healthy
      image-builder:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    networks:
      - dev-net

  # Frontend Vite dev server
  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      PNPM_HOME: /pnpm
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - pnpm-store:/pnpm
    command: sh -c "npm install -g pnpm@latest --silent && pnpm install && pnpm dev"
    ports:
      - "5173:5173"
    networks:
      - dev-net

networks:
  dev-net:

volumes:
  dind-storage:
  3compute-base:
  3compute-uploads:
  3compute-classrooms:
  frontend-node-modules:
  pnpm-store:
  backend-logs:
