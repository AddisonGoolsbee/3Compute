services:

  # Docker-in-Docker daemon — user terminal containers are spawned here.
  # Both dind and backend mount the same named volumes at identical paths so
  # that volume specs passed to "docker run" by the backend resolve correctly
  # inside DinD's daemon.
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 10s
      retries: 12
    volumes:
      - dind-storage:/var/lib/docker
      - csroom-uploads:/var/lib/csroom/uploads
      - csroom-classrooms:/var/lib/csroom/classrooms
    networks:
      - dev-net

  # One-shot: builds the csroom terminal image into DinD on every compose up.
  image-builder:
    image: docker:27-cli
    environment:
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - ./backend:/workspace
    working_dir: /workspace
    command: docker build -t csroom:latest .
    depends_on:
      dind:
        condition: service_healthy
    networks:
      - dev-net

  # Prepare shared storage with the same permission model prod uses:
  # owned by www-data (33) with supplementary group csroom-container (995),
  # setgid bit so new files inherit GID 995, and a shallow re-chown of existing
  # entries so re-running compose up on a stale volume self-heals.
  data-init:
    image: alpine:3
    command: >-
      sh -c "
        addgroup -g 995 csroom-container 2>/dev/null || true &&
        mkdir -p /data/uploads /data/classrooms &&
        chown 33:995 /data /data/uploads /data/classrooms &&
        chmod 2775 /data /data/uploads /data/classrooms &&
        find /data/uploads /data/classrooms -mindepth 1 -type d -exec chown 33:995 {} + 2>/dev/null;
        find /data/uploads /data/classrooms -mindepth 1 -type d -exec chmod 2775 {} + 2>/dev/null;
        find /data/uploads /data/classrooms -mindepth 1 -type f -exec chown 33:995 {} + 2>/dev/null;
        find /data/uploads /data/classrooms -mindepth 1 -type f -exec chmod 664 {} + 2>/dev/null;
        true
      "
    volumes:
      - csroom-base:/data
      - csroom-uploads:/data/uploads
      - csroom-classrooms:/data/classrooms

  # FastAPI backend with hot-reload
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "33:33"  # www-data, mirrors prod
    group_add:
      - "995"  # csroom-container — supplementary group so the backend can
               # read/write files the container user (999:995) creates, and
               # vice versa. Mirrors prod `usermod -a -G csroom-container www-data`.
    cap_add:
      - CHOWN  # mirrors AmbientCapabilities=CAP_CHOWN in systemd service
    environment:
      DOCKER_HOST: tcp://dind:2375
      UPLOADS_ROOT: /var/lib/csroom/uploads
      CLASSROOMS_ROOT: /var/lib/csroom/classrooms
      USERS_JSON_FILE: /var/lib/csroom/users.json
    env_file:
      - backend/.env
    volumes:
      - .:/var/www/csroom
      - backend-logs:/var/www/csroom/logs
      - csroom-base:/var/lib/csroom
      - csroom-uploads:/var/lib/csroom/uploads
      - csroom-classrooms:/var/lib/csroom/classrooms
    working_dir: /var/www/csroom
    command: sh -c "pip install -q -r backend/requirements.txt && python -m backend.api --host 0.0.0.0 --port 5555 --reload"
    ports:
      - "5555:5555"
    depends_on:
      dind:
        condition: service_healthy
      image-builder:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    networks:
      - dev-net

  # Frontend Vite dev server
  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      PNPM_HOME: /pnpm
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - pnpm-store:/pnpm
    command: sh -c "npm install -g pnpm@latest --silent && pnpm install && pnpm dev"
    ports:
      - "5173:5173"
    networks:
      - dev-net

networks:
  dev-net:

volumes:
  dind-storage:
  csroom-base:
  csroom-uploads:
  csroom-classrooms:
  frontend-node-modules:
  pnpm-store:
  backend-logs:
