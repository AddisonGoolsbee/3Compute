# Disable the bottom status bar
set-option -g status off

# Mouse OFF — lets the browser handle text selection normally.
# Scrolling is handled by xterm.js's own scrollback buffer.
set-option -g mouse off

# Set large scrollback buffer
set-option -g history-limit 10000

# Disable alternate-screen switching (so scrollback shows program output)
set-option -ga terminal-overrides ',xterm*:smcup@:rmcup@'
